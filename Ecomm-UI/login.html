<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoplane | Login & Register</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #222 0%, #111 100%) !important;
        font-family: "Outfit", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-top: 100px;
        padding-bottom: 50px;
      }
      
      .auth-container {
        width: 100%;
        max-width: 480px;
        background: rgba(30, 30, 30, 0.75);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 102, 0, 0.15);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 102, 0, 0.1);
        border-radius: 20px;
        padding: 40px;
        transition: all 0.4s ease-in-out;
      }

      .auth-container:hover {
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(255, 102, 0, 0.2);
        border-color: rgba(255, 102, 0, 0.3);
      }

      .auth-tabs {
        display: flex;
        margin-bottom: 30px;
        border-bottom: 2px solid #333;
        position: relative;
      }

      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        color: #aaa;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }

      .auth-tab.active {
        color: var(--primary-color);
        border-bottom: 2px solid var(--primary-color);
      }

      .form-control {
        background: rgba(17, 17, 17, 0.6) !important;
        border: 1px solid #444 !important;
        color: #fff !important;
        padding: 12px 16px;
        border-radius: 10px;
        transition: all 0.3s;
      }

      .form-control:focus {
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 8px rgba(255, 102, 0, 0.25) !important;
      }

      .input-group-text {
        background: rgba(17, 17, 17, 0.6) !important;
        border: 1px solid #444 !important;
        color: #888;
        border-radius: 10px 0 0 10px;
      }

      .form-control {
        border-radius: 0 10px 10px 0;
      }

      .auth-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: var(--primary-color);
        border: none;
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(255, 102, 0, 0.2);
      }

      .auth-btn:hover {
        background: var(--hover-color);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 102, 0, 0.35);
      }

      .auth-toggle-link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .auth-toggle-link:hover {
        color: var(--hover-color);
        text-decoration: underline;
      }

      /* Alert container inside card */
      .alert {
        border-radius: 10px;
        display: none;
        font-size: 14px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SHOPIFY</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#trending-section">Trending</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#clothing-section">Clothing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#electronics-section">Electronics</a>
            </li>
            <!-- Cart Icon in Navbar -->
            <li class="nav-item">
              <a class="nav-link" href="cart.html">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- AUTH CARD -->
    <div class="auth-container mt-4">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">
          Login
        </div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">
          Register
        </div>
      </div>

      <!-- Alerts -->
      <div class="alert alert-danger" id="auth-error" role="alert"></div>
      <div class="alert alert-success" id="auth-success" role="alert"></div>

      <!-- LOGIN FORM -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="form-label text-light">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input
              type="email"
              id="login-email"
              class="form-control"
              placeholder="name@example.com"
              required
            />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label text-light">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              id="login-password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>
        </div>
        <button type="submit" class="auth-btn mt-2">Sign In</button>
        <div class="text-center mt-4 text-secondary">
          Don't have an account?
          <a href="#" class="auth-toggle-link" onclick="switchTab('register')">Register here</a>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
        <div class="mb-3">
          <label class="form-label text-light">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input
              type="text"
              id="register-name"
              class="form-control"
              placeholder="John Doe"
              required
            />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-light">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input
              type="email"
              id="register-email"
              class="form-control"
              placeholder="name@example.com"
              required
            />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label text-light">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              id="register-password"
              class="form-control"
              placeholder="Create a strong password"
              required
            />
          </div>
        </div>
        <button type="submit" class="auth-btn mt-3">Create Account</button>
        <div class="text-center mt-4 text-secondary">
          Already have an account?
          <a href="#" class="auth-toggle-link" onclick="switchTab('login')">Sign in here</a>
        </div>
      </form>
    </div>

    <!-- Script loading -->
    <script src="js/cart.js"></script>
    <script>
      const BASE_URL = "https://shoplane-api.onrender.com";

      function switchTab(tab) {
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");
        const tabLogin = document.getElementById("tab-login");
        const tabRegister = document.getElementById("tab-register");
        const errorAlert = document.getElementById("auth-error");
        const successAlert = document.getElementById("auth-success");

        errorAlert.style.display = "none";
        successAlert.style.display = "none";

        if (tab === "login") {
          loginForm.style.display = "block";
          registerForm.style.display = "none";
          tabLogin.classList.add("active");
          tabRegister.classList.remove("active");
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "block";
          tabLogin.classList.remove("active");
          tabRegister.classList.add("active");
        }
      }

      async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const errorAlert = document.getElementById("auth-error");
        const successAlert = document.getElementById("auth-success");

        errorAlert.style.display = "none";
        successAlert.style.display = "none";

        try {
          const response = await fetch(`${BASE_URL}/users/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || "Invalid email or password.");
          }

          const user = await response.json();

          if (user && user.id) {
            // Save user info
            localStorage.setItem("currentUser", JSON.stringify(user));
            successAlert.innerText = `Welcome back, ${user.name}! Redirecting...`;
            successAlert.style.display = "block";

            // Redirect back to home or the previous page
            setTimeout(() => {
              window.location.href = "index.html";
            }, 1200);
          } else {
            errorAlert.innerText = "Invalid email or password.";
            errorAlert.style.display = "block";
          }
        } catch (error) {
          console.error("Login error:", error);
          errorAlert.innerText = error.message || "An error occurred during login. Please ensure the backend server is running.";
          errorAlert.style.display = "block";
        }
      }

      async function handleRegister(event) {
        event.preventDefault();
        const name = document.getElementById("register-name").value.trim();
        const email = document.getElementById("register-email").value.trim();
        const password = document.getElementById("register-password").value;
        const errorAlert = document.getElementById("auth-error");
        const successAlert = document.getElementById("auth-success");

        errorAlert.style.display = "none";
        successAlert.style.display = "none";

        try {
          const response = await fetch(`${BASE_URL}/users/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, email, password }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || "Registration failed. Email might already be registered.");
          }

          const user = await response.json();

          if (user && user.id) {
            successAlert.innerText = "Account created successfully! Switching to Login...";
            successAlert.style.display = "block";
            
            // Clear inputs
            document.getElementById("register-name").value = "";
            document.getElementById("register-email").value = "";
            document.getElementById("register-password").value = "";

            setTimeout(() => {
              switchTab("login");
              document.getElementById("login-email").value = email;
            }, 1500);
          } else {
            errorAlert.innerText = "Registration failed. Email might already be registered.";
            errorAlert.style.display = "block";
          }
        } catch (error) {
          console.error("Registration error:", error);
          errorAlert.innerText = error.message || "An error occurred during registration. Please check the backend connection.";
          errorAlert.style.display = "block";
        }
      }
    </script>
  </body>
</html>
